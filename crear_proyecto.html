{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Proyecto - Movilnet</title>
    <style>
        :root {
            --movilnet-orange: #ff6600;
            --bg-body: #f1f5f9;
            --text-main: #1e293b;
        }

        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg-body); color: var(--text-main); }

        .page-wrapper {
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 40px 20px;
        }

        .form-card {
            background: white; border-radius: 16px; padding: 40px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1); width: 100%; max-width: 560px;
            border-top: 4px solid var(--movilnet-orange);
        }

        .form-card h2 {
            margin: 0 0 8px 0; font-size: 1.5rem; color: var(--text-main);
        }
        .form-card .subtitulo {
            color: #64748b; font-size: 0.9rem; margin-bottom: 30px;
        }

        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block; font-weight: 600; font-size: 0.85rem;
            color: #475569; margin-bottom: 6px;
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%; padding: 12px 14px; border: 1px solid #d1d5db;
            border-radius: 10px; font-size: 0.95rem; transition: 0.3s;
            font-family: inherit; background: white; color: var(--text-main);
        }
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none; border-color: var(--movilnet-orange);
            box-shadow: 0 0 0 3px rgba(255,102,0,0.12);
        }
        .form-group textarea { resize: vertical; min-height: 100px; }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .btn-group { display: flex; gap: 12px; margin-top: 25px; }

        .btn-crear {
            flex: 1; background: linear-gradient(135deg, #ff6600, #ff8533);
            color: white; border: none; padding: 13px 20px; border-radius: 10px;
            font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.3s;
            box-shadow: 0 4px 12px rgba(255,102,0,0.25);
        }
        .btn-crear:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(255,102,0,0.35);
        }

        .btn-cancelar {
            padding: 13px 24px; background: #f1f5f9; color: #475569;
            border: 1px solid #d1d5db; border-radius: 10px; text-decoration: none;
            font-weight: 600; font-size: 0.95rem; transition: 0.3s;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-cancelar:hover { background: #e2e8f0; }

        .errores {
            background: #fef2f2; border: 1px solid #fecaca; color: #dc2626;
            padding: 12px 16px; border-radius: 8px; margin-bottom: 20px;
            font-size: 0.85rem;
        }
        .errores ul { margin: 5px 0 0 0; padding-left: 18px; }

        .info-tareas {
            background: #fff7ed;
            border: 1px solid #fed7aa;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 0.82rem;
            color: #9a3412;
            margin-bottom: 20px;
            display: none;
            gap: 10px;
            align-items: flex-start;
        }
        .info-tareas.visible { display: flex; }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <div class="form-card">
            <h2>&#128194; Crear Nuevo Proyecto</h2>
            <p class="subtitulo">Completa los datos para registrar un nuevo proyecto en el sistema.</p>

            {% if form.errors %}
                <div class="errores">
                    <strong>&#9888;&#65039; Corrige los siguientes errores:</strong>
                    {{ form.errors }}
                </div>
            {% endif %}

            <form method="POST" id="form-proyecto">
                {% csrf_token %}

                <div class="form-group">
                    <label for="id_nombre">Nombre del Proyecto</label>
                    <input type="text" name="nombre" id="id_nombre"
                           placeholder="Ej: Sistema de Facturacion"
                           value="{{ form.nombre.value|default:'' }}" required>
                </div>

                <div class="form-group">
                    <label for="id_descripcion">Descripcion</label>
                    <textarea name="descripcion" id="id_descripcion"
                              placeholder="Describe brevemente el objetivo del proyecto...">{{ form.descripcion.value|default:'' }}</textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="id_tipo">Tipo de Proyecto</label>
                        <select name="tipo" id="id_tipo" onchange="actualizarInfoTareas(this.value)">
                            <option value="FRONTEND"      {% if form.tipo.value == 'FRONTEND' %}selected{% endif %}>Frontend</option>
                            <option value="BACKEND"       {% if form.tipo.value == 'BACKEND' %}selected{% endif %}>Backend</option>
                            <option value="BASE_DE_DATOS" {% if form.tipo.value == 'BASE_DE_DATOS' %}selected{% endif %}>Base de Datos</option>
                            <option value="PERSONALIZADO" {% if form.tipo.value == 'PERSONALIZADO' or not form.tipo.value %}selected{% endif %}>Proyecto Personalizado</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="id_fecha_deadline">Fecha Limite (Deadline)</label>
                        <input type="date" name="fecha_deadline" id="id_fecha_deadline"
                               value="{{ form.fecha_deadline.value|default:'' }}">
                    </div>
                </div>

                <div class="info-tareas" id="info-tareas-banner">
                    <span>&#128203;</span>
                    <span id="info-tareas-texto"></span>
                </div>

                <div class="btn-group">
                    <button type="submit" class="btn-crear">Crear Proyecto</button>
                    <a href="{% url 'home' %}" class="btn-cancelar">Cancelar</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        const TAREAS_INFO = {
            'FRONTEND':      { count: 10, label: 'Frontend' },
            'BACKEND':       { count: 10, label: 'Backend' },
            'BASE_DE_DATOS': { count: 10, label: 'Base de Datos' },
            'PERSONALIZADO': { count: 0,  label: 'Personalizado' },
        };

        function actualizarInfoTareas(tipo) {
            const banner = document.getElementById('info-tareas-banner');
            const texto  = document.getElementById('info-tareas-texto');
            const info   = TAREAS_INFO[tipo];
            if (info && info.count > 0) {
                texto.textContent = 'Se crean automaticamente ' + info.count + ' tareas pre-cargadas para proyectos de tipo ' + info.label + '. Solo tendra que asignarlas a los desarrolladores.';
                banner.classList.add('visible');
            } else {
                banner.classList.remove('visible');
            }
        }

        actualizarInfoTareas(document.getElementById('id_tipo').value);
    </script>
</body>
</html>
