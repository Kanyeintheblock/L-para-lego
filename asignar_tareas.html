{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asignar Tarea - Movilnet</title>
    <style>
        :root {
            --movilnet-orange: #ff6600;
            --bg-body: #f1f5f9;
            --text-main: #1e293b;
        }

        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg-body); color: var(--text-main); }

        .page-wrapper {
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 40px 20px;
        }

        .form-card {
            background: white; border-radius: 16px; padding: 40px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1); width: 100%; max-width: 520px;
            border-top: 4px solid var(--movilnet-orange);
        }

        .form-card h2 {
            margin: 0 0 8px 0; font-size: 1.5rem; color: var(--text-main);
        }
        .form-card .subtitulo {
            color: #64748b; font-size: 0.9rem; margin-bottom: 30px;
        }

        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block; font-weight: 600; font-size: 0.85rem;
            color: #475569; margin-bottom: 6px;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%; padding: 12px 14px; border: 1px solid #d1d5db;
            border-radius: 10px; font-size: 0.95rem; transition: 0.3s;
            font-family: inherit;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none; border-color: var(--movilnet-orange);
            box-shadow: 0 0 0 3px rgba(255,102,0,0.12);
        }
        .form-group textarea { resize: vertical; min-height: 80px; }

        .btn-group { display: flex; gap: 12px; margin-top: 25px; }

        .btn-crear {
            flex: 1; background: linear-gradient(135deg, #ff6600, #ff8533);
            color: white; border: none; padding: 13px 20px; border-radius: 10px;
            font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.3s;
            box-shadow: 0 4px 12px rgba(255,102,0,0.25);
        }
        .btn-crear:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(255,102,0,0.35);
        }

        .btn-cancelar {
            padding: 13px 24px; background: #f1f5f9; color: #475569;
            border: 1px solid #d1d5db; border-radius: 10px; text-decoration: none;
            font-weight: 600; font-size: 0.95rem; transition: 0.3s;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-cancelar:hover { background: #e2e8f0; }

        .project-highlight {
            background: #fff7ed; color: #c2410c; padding: 10px 15px;
            border-radius: 8px; border-left: 4px solid var(--movilnet-orange);
            margin-bottom: 25px; font-size: 0.9rem; font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <div class="form-card">
            <h2>➕ Asignar Nueva Tarea</h2>
            <p class="subtitulo">Crea una actividad y asígnala a un desarrollador para este proyecto.</p>

            <div class="project-highlight">
                📍 Proyecto: <strong>{{ proyecto.nombre }}</strong>
            </div>

            <form method="POST">
                {% csrf_token %}

                <div class="form-group">
                    <label for="id_title">Título de la Tarea</label>
                    {{ from_t.title }}
                </div>

                <div class="form-group">
                    <label for="id_description">Descripción</label>
                    {{ from_t.description }}
                </div>

                <div class="form-group">
                    <label for="id_assigned_to">Desarrollador Responsable</label>
                    {{ from_t.assigned_to }}
                </div>

                <div class="btn-group">
                    <button type="submit" class="btn-crear">Registrar Tarea</button>
                    <a href="{% url 'home' %}" class="btn-cancelar">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
