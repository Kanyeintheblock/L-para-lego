{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Proyectos Inhabilitados</title>
    <link rel="stylesheet" href="{% static 'ventas/css/estructura.css' %}">
</head>
<body>
    <div class="cancelados-container">
        <h1>Proyectos Inhabilitados</h1>
        
        <div class="proyectos-listado">
            {% for proyecto in proyectos %}
                <div class="proyecto-card-cancelado inactivo">
                    <h4>{{ proyecto.nombre }}</h4>
                    <form action="{% url 'restaurar_proyecto' proyecto.pk %}" method="POST">
                        {% csrf_token %}
                        <button type="submit" class="btn-restaurar">Restaurar</button>
                    </form>
                </div>
            {% empty %}
                <p>No hay proyectos inhabilitados actualmente.</p>
            {% endfor %}
        </div>

        <a href="{% url 'home' %}" class="btn-volver">← Volver al Panel Principal</a>
    </div>
</body>
</html>
